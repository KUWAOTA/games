<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRコード迷路 | QR Maze</title>
    <meta name="description" content="入力した文字列からQRコードを生成し、それが迷路になる！">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --bg2: #12121a;
            --accent: #00cec9;
            --accent2: #81ecec;
            --wall: #2d3436;
            --path: #dfe6e9;
            --player: #6c5ce7;
            --goal: #fd79a8;
            --text: #e8e8f0;
            --text2: #8888a0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: var(--text2);
            text-decoration: none;
            font-size: 0.9rem;
            z-index: 100;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--accent2);
        }

        header {
            text-align: center;
            padding: 40px 20px 10px;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--text2);
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .input-section {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            max-width: 600px;
            width: 100%;
        }

        .input-section input {
            flex: 1;
            min-width: 200px;
            background: var(--bg2);
            color: var(--text);
            border: 1px solid rgba(0, 206, 201, 0.3);
            padding: 10px 16px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-section input:focus {
            border-color: var(--accent);
        }

        .input-section input::placeholder {
            color: var(--text2);
        }

        .controls {
            display: flex;
            gap: 10px;
            padding: 5px 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls button {
            background: linear-gradient(135deg, var(--accent), #00b5b0);
            color: var(--bg);
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 206, 201, 0.4);
        }

        .stats {
            display: flex;
            gap: 20px;
            padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }

        .stat-item {
            color: var(--accent2);
        }

        .stat-item span {
            color: var(--text2);
            font-size: 0.75rem;
        }

        .current-text {
            color: var(--text2);
            font-size: 0.8rem;
            padding: 5px;
            font-family: 'JetBrains Mono', monospace;
        }

        .maze-wrapper {
            position: relative;
            padding: 10px;
        }

        #mazeCanvas {
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 206, 201, 0.15);
        }

        .mobile-controls {
            display: none;
            gap: 5px;
            padding: 20px;
            justify-content: center;
        }

        .d-btn {
            width: 60px;
            height: 60px;
            background: var(--bg2);
            border: 1px solid rgba(0, 206, 201, 0.3);
            border-radius: 12px;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }

        .d-btn:active {
            background: rgba(0, 206, 201, 0.2);
            transform: scale(0.95);
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }

        .d-pad .empty {
            visibility: hidden;
        }

        .instructions {
            padding: 15px;
            color: var(--text2);
            font-size: 0.85rem;
            text-align: center;
        }

        .win-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.9);
            z-index: 200;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .win-overlay.show {
            display: flex;
        }

        .win-overlay h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--accent);
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .win-overlay p {
            color: var(--text2);
            margin-top: 10px;
            font-size: 1.1rem;
        }

        .win-overlay .qr-result {
            color: var(--accent2);
            margin-top: 15px;
            font-size: 1rem;
            max-width: 300px;
            text-align: center;
            word-break: break-all;
        }

        .win-overlay button {
            margin-top: 25px;
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--accent), #00b5b0);
            color: var(--bg);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        @keyframes pop {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .mobile-controls {
                display: flex;
            }

            header h1 {
                font-size: 1.4rem;
            }

            header {
                padding: 30px 10px 8px;
            }

            .input-section {
                padding: 10px 15px;
            }

            .input-section input {
                font-size: 0.85rem;
                padding: 8px 12px;
            }

            #mazeCanvas {
                max-width: 100%;
                height: auto;
            }

            .stats {
                font-size: 0.8rem;
            }

            .current-text {
                font-size: 0.7rem;
            }

            .controls button {
                padding: 8px 18px;
                font-size: 0.85rem;
            }

            .d-btn {
                width: 55px;
                height: 55px;
                font-size: 1.3rem;
            }

            .d-pad {
                grid-template-columns: repeat(3, 55px);
                grid-template-rows: repeat(3, 55px);
            }
        }

        @media (pointer: coarse) {
            .mobile-controls {
                display: flex;
            }
        }
    </style>
</head>

<body>
    <a href="../index.html" class="back-link">← BACK</a>

    <header>
        <h1>QRコード迷路</h1>
        <p>入力した文字列のQRコードが迷路に！</p>
    </header>

    <div class="input-section">
        <input type="text" id="qrInput" placeholder="迷路にしたい文字列を入力..." value="Hello World!" maxlength="50">
    </div>

    <div class="controls">
        <button onclick="generateFromInput()">この文字列でQR迷路を生成</button>
    </div>

    <div class="current-text">
        QR内容: <span id="currentText">Hello World!</span>
    </div>

    <div class="stats">
        <div class="stat-item"><span>MOVES </span><span id="moveCount">0</span></div>
        <div class="stat-item"><span>TIME </span><span id="timer">0:00</span></div>
    </div>

    <div class="maze-wrapper">
        <canvas id="mazeCanvas" width="420" height="420"></canvas>
    </div>

    <div class="mobile-controls">
        <div class="d-pad">
            <div class="empty"></div>
            <button class="d-btn" ontouchstart="move(0,-1);event.preventDefault();" onclick="move(0,-1)">▲</button>
            <div class="empty"></div>
            <button class="d-btn" ontouchstart="move(-1,0);event.preventDefault();" onclick="move(-1,0)">◀</button>
            <div class="empty"></div>
            <button class="d-btn" ontouchstart="move(1,0);event.preventDefault();" onclick="move(1,0)">▶</button>
            <div class="empty"></div>
            <button class="d-btn" ontouchstart="move(0,1);event.preventDefault();" onclick="move(0,1)">▼</button>
            <div class="empty"></div>
        </div>
    </div>

    <div class="instructions">
        <p>矢印キー or WASD で移動 | 🟪 = プレイヤー | 🟥 = ゴール</p>
    </div>

    <div class="win-overlay" id="winOverlay">
        <h2>CLEAR!</h2>
        <p id="winStats"></p>
        <div class="qr-result" id="qrResult"></div>
        <button onclick="closeWin()">次の迷路へ</button>
    </div>

    <!-- QR Code generation library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');

        let qrModules = []; // The QR code module data
        let mazeSize = 21;
        let cellSize = 20;

        let grid = [];
        let playerX = 1, playerY = 1;
        let goalX, goalY;
        let moves = 0;
        let startTime = 0;
        let timerInterval = null;
        let gameWon = false;
        let currentInputText = 'Hello World!';

        const COLORS = {
            wall: '#0f0f1a',
            path: '#e8e8f0',
            player: '#6c5ce7',
            playerGlow: 'rgba(108, 92, 231, 0.4)',
            goal: '#fd79a8',
            goalGlow: 'rgba(253, 121, 168, 0.4)',
            visited: 'rgba(0, 206, 201, 0.12)',
            qrAccent: 'rgba(0, 206, 201, 0.08)'
        };

        function generateFromInput() {
            const input = document.getElementById('qrInput').value.trim();
            if (!input) {
                alert('文字列を入力してください');
                return;
            }
            currentInputText = input;
            document.getElementById('currentText').textContent = input;
            generateQRMaze(input);
        }

        function generateQRMaze(text) {
            gameWon = false;
            moves = 0;
            document.getElementById('moveCount').textContent = '0';
            clearInterval(timerInterval);
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);

            // Generate QR code
            const qr = qrcode(0, 'M');
            qr.addData(text);
            qr.make();

            const moduleCount = qr.getModuleCount();
            mazeSize = moduleCount;

            // Make the maze size odd (needed for maze generation overlay)
            // We'll use the QR as a visual base and carve paths through it
            qrModules = [];
            for (let y = 0; y < moduleCount; y++) {
                qrModules[y] = [];
                for (let x = 0; x < moduleCount; x++) {
                    qrModules[y][x] = qr.isDark(y, x) ? 1 : 0;
                }
            }

            // Create maze grid from QR
            // Strategy: QR dark = wall, QR light = path, then ensure connectivity
            grid = [];
            for (let y = 0; y < mazeSize; y++) {
                grid[y] = [];
                for (let x = 0; x < mazeSize; x++) {
                    grid[y][x] = qrModules[y][x]; // 1 = wall (dark), 0 = path (light)
                }
            }

            // Ensure start and goal are open
            grid[1][1] = 0;
            grid[1][2] = 0;
            grid[2][1] = 0;

            // Ensure connectivity by carving a path from start to a far corner
            ensureConnectivity();

            // Set player
            playerX = 1;
            playerY = 1;

            // Find goal: furthest reachable open cell
            findGoal();

            // Calculate cell size
            cellSize = Math.floor(Math.min(420, window.innerWidth - 40) / mazeSize);
            canvas.width = mazeSize * cellSize;
            canvas.height = mazeSize * cellSize;

            draw();
        }

        function ensureConnectivity() {
            // BFS from start to find all reachable cells
            const reachable = new Set();
            const queue = [[1, 1]];
            reachable.add('1,1');

            while (queue.length > 0) {
                const [cx, cy] = queue.shift();
                for (const [dx, dy] of [[0, 1], [0, -1], [1, 0], [-1, 0]]) {
                    const nx = cx + dx, ny = cy + dy;
                    const key = `${nx},${ny}`;
                    if (nx >= 0 && nx < mazeSize && ny >= 0 && ny < mazeSize &&
                        grid[ny][nx] === 0 && !reachable.has(key)) {
                        reachable.add(key);
                        queue.push([nx, ny]);
                    }
                }
            }

            // If not enough reachable cells, carve more paths
            if (reachable.size < mazeSize * 2) {
                // Carve a winding path through the QR code
                let cx = 1, cy = 1;
                const target_x = mazeSize - 2;
                const target_y = mazeSize - 2;

                while (cx < target_x || cy < target_y) {
                    grid[cy][cx] = 0;
                    if (Math.random() < 0.6 && cx < target_x) {
                        cx++;
                    } else if (cy < target_y) {
                        cy++;
                    } else {
                        cx++;
                    }
                    // Also carve some side paths
                    if (Math.random() < 0.3) {
                        const sd = Math.random() < 0.5 ? 1 : -1;
                        const sy = cy + sd;
                        if (sy > 0 && sy < mazeSize - 1) grid[sy][cx] = 0;
                    }
                }
                grid[target_y][target_x] = 0;
            }

            // Additional connectivity: randomly open some walls to create more paths
            for (let i = 0; i < mazeSize * 2; i++) {
                const rx = 1 + Math.floor(Math.random() * (mazeSize - 2));
                const ry = 1 + Math.floor(Math.random() * (mazeSize - 2));
                // Open wall if it connects two path cells
                if (grid[ry][rx] === 1) {
                    let adjacentPaths = 0;
                    for (const [dx, dy] of [[0, 1], [0, -1], [1, 0], [-1, 0]]) {
                        const nx = rx + dx, ny = ry + dy;
                        if (nx >= 0 && nx < mazeSize && ny >= 0 && ny < mazeSize && grid[ny][nx] === 0) {
                            adjacentPaths++;
                        }
                    }
                    if (adjacentPaths >= 2) {
                        grid[ry][rx] = 0;
                    }
                }
            }

            // Ensure the border is walls (preserve QR look)
            for (let i = 0; i < mazeSize; i++) {
                grid[0][i] = 1;
                grid[mazeSize - 1][i] = 1;
                grid[i][0] = 1;
                grid[i][mazeSize - 1] = 1;
            }
            grid[1][1] = 0; // ensure start is open
        }

        function findGoal() {
            // BFS to find furthest reachable cell
            const dist = {};
            const queue = [[1, 1, 0]];
            dist['1,1'] = 0;
            let maxDist = 0;
            goalX = mazeSize - 2;
            goalY = mazeSize - 2;

            while (queue.length > 0) {
                const [cx, cy, d] = queue.shift();
                for (const [dx, dy] of [[0, 1], [0, -1], [1, 0], [-1, 0]]) {
                    const nx = cx + dx, ny = cy + dy;
                    const key = `${nx},${ny}`;
                    if (nx >= 0 && nx < mazeSize && ny >= 0 && ny < mazeSize &&
                        grid[ny][nx] === 0 && !(key in dist)) {
                        dist[key] = d + 1;
                        queue.push([nx, ny, d + 1]);
                        if (d + 1 > maxDist) {
                            maxDist = d + 1;
                            goalX = nx;
                            goalY = ny;
                        }
                    }
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < mazeSize; y++) {
                for (let x = 0; x < mazeSize; x++) {
                    const px = x * cellSize;
                    const py = y * cellSize;

                    if (grid[y][x] === 1) {
                        // Wall - dark QR module
                        ctx.fillStyle = qrModules[y] && qrModules[y][x] ? '#0f0f1a' : '#181825';
                    } else if (grid[y][x] === 2) {
                        ctx.fillStyle = COLORS.visited;
                    } else {
                        // Path - light QR module
                        ctx.fillStyle = qrModules[y] && qrModules[y][x] === 0 ? '#e8e8f0' : '#c8c8d8';
                    }
                    ctx.fillRect(px, py, cellSize, cellSize);

                    // Subtle grid
                    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
                    ctx.strokeRect(px, py, cellSize, cellSize);
                }
            }

            // QR finder patterns highlight
            drawFinderOverlay(0, 0);
            drawFinderOverlay(mazeSize - 7, 0);
            drawFinderOverlay(0, mazeSize - 7);

            // Goal glow
            ctx.fillStyle = COLORS.goalGlow;
            ctx.beginPath();
            ctx.arc(goalX * cellSize + cellSize / 2, goalY * cellSize + cellSize / 2, cellSize * 1.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = COLORS.goal;
            ctx.fillRect(goalX * cellSize + 2, goalY * cellSize + 2, cellSize - 4, cellSize - 4);

            // Player
            ctx.fillStyle = COLORS.playerGlow;
            ctx.beginPath();
            ctx.arc(playerX * cellSize + cellSize / 2, playerY * cellSize + cellSize / 2, cellSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = COLORS.player;
            ctx.beginPath();
            ctx.arc(playerX * cellSize + cellSize / 2, playerY * cellSize + cellSize / 2, cellSize / 2 - 1, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawFinderOverlay(ox, oy) {
            if (ox + 7 > mazeSize || oy + 7 > mazeSize) return;
            ctx.globalAlpha = 0.12;
            for (let dy = 0; dy < 7; dy++) {
                for (let dx = 0; dx < 7; dx++) {
                    const isEdge = dx === 0 || dx === 6 || dy === 0 || dy === 6;
                    const isInner = dx >= 2 && dx <= 4 && dy >= 2 && dy <= 4;
                    if (isEdge || isInner) {
                        ctx.fillStyle = '#00cec9';
                        ctx.fillRect((ox + dx) * cellSize, (oy + dy) * cellSize, cellSize, cellSize);
                    }
                }
            }
            ctx.globalAlpha = 1;
        }

        function move(dx, dy) {
            if (gameWon) return;
            const nx = playerX + dx;
            const ny = playerY + dy;

            if (nx >= 0 && nx < mazeSize && ny >= 0 && ny < mazeSize && grid[ny][nx] !== 1) {
                grid[playerY][playerX] = 2;
                playerX = nx;
                playerY = ny;
                moves++;
                document.getElementById('moveCount').textContent = moves;
                draw();

                if (playerX === goalX && playerY === goalY) {
                    gameWon = true;
                    clearInterval(timerInterval);
                    showWin();
                }
            }
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const min = Math.floor(elapsed / 60);
            const sec = elapsed % 60;
            document.getElementById('timer').textContent = `${min}:${sec.toString().padStart(2, '0')}`;
        }

        function showWin() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const min = Math.floor(elapsed / 60);
            const sec = elapsed % 60;
            document.getElementById('winStats').textContent =
                `${moves} moves | ${min}:${sec.toString().padStart(2, '0')}`;
            document.getElementById('qrResult').textContent =
                `QR内容: "${currentInputText}"`;
            document.getElementById('winOverlay').classList.add('show');
        }

        function closeWin() {
            document.getElementById('winOverlay').classList.remove('show');
            generateFromInput();
        }

        // Keyboard
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W': move(0, -1); e.preventDefault(); break;
                case 'ArrowDown': case 's': case 'S': move(0, 1); e.preventDefault(); break;
                case 'ArrowLeft': case 'a': case 'A': move(-1, 0); e.preventDefault(); break;
                case 'ArrowRight': case 'd': case 'D': move(1, 0); e.preventDefault(); break;
            }
        });

        // Enter key in input
        document.getElementById('qrInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                generateFromInput();
            }
        });

        // Init
        generateQRMaze('Hello World!');
    </script>
</body>

</html>
